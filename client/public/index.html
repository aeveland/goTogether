<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Go Together - Group Trip Planner and Shared Task Manager">
    <meta name="theme-color" content="#1976d2">
    
    <title>Go Together</title>
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Material Design Web CSS -->
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- Roboto Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Google Places API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBOti4mM-6x9WDnZIjIeyEU21OpBXqWBgw&libraries=places"></script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body>
    <div id="app">
        <!-- Loading spinner while app initializes -->
        <div class="loading-container">
            <div class="mdc-circular-progress" style="width:48px;height:48px;" role="progressbar" aria-label="Loading..." aria-valuemin="0" aria-valuemax="1">
                <div class="mdc-circular-progress__determinate-container">
                    <svg class="mdc-circular-progress__determinate-circle-graphic" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <circle class="mdc-circular-progress__determinate-track" cx="24" cy="24" r="18" stroke-width="4"/>
                        <circle class="mdc-circular-progress__determinate-circle" cx="24" cy="24" r="18" stroke-dasharray="113.097" stroke-dashoffset="113.097" stroke-width="4"/>
                    </svg>
                </div>
                <div class="mdc-circular-progress__indeterminate-container">
                    <div class="mdc-circular-progress__spinner-layer">
                        <div class="mdc-circular-progress__circle-clipper mdc-circular-progress__circle-left">
                            <svg class="mdc-circular-progress__indeterminate-circle-graphic" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="24" cy="24" r="18" stroke-dasharray="113.097" stroke-dashoffset="56.549" stroke-width="4"/>
                            </svg>
                        </div>
                        <div class="mdc-circular-progress__gap-patch">
                            <svg class="mdc-circular-progress__indeterminate-circle-graphic" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="24" cy="24" r="18" stroke-dasharray="113.097" stroke-dashoffset="56.549" stroke-width="3.2"/>
                            </svg>
                        </div>
                        <div class="mdc-circular-progress__circle-clipper mdc-circular-progress__circle-right">
                            <svg class="mdc-circular-progress__indeterminate-circle-graphic" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="24" cy="24" r="18" stroke-dasharray="113.097" stroke-dashoffset="56.549" stroke-width="4"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
            <p>Loading Go Together...</p>
        </div>
    </div>
    
    <!-- Material Design Web JavaScript -->
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    
    <!-- Debug script to test if JavaScript is running at all -->
    <script>
        console.log('HTML script loaded - JavaScript is working');
        
        // Test if we can access the DOM
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded fired from HTML script');
            
            // If the main app doesn't load in 5 seconds, show an error
            setTimeout(function() {
                const loadingContainer = document.querySelector('.loading-container');
                if (loadingContainer && loadingContainer.style.display !== 'none') {
                    console.error('App failed to load within 5 seconds');
                    console.log('Main script loaded:', !!window.goTogetherScriptLoaded);
                    
                    const app = document.getElementById('app');
                    if (app) {
                        const scriptLoaded = window.goTogetherScriptLoaded;
                        app.innerHTML = `
                            <div style="padding: 20px; text-align: center; font-family: Arial, sans-serif;">
                                <h2 style="color: #d32f2f;">App Loading Failed</h2>
                                <p><strong>Main Script Loaded:</strong> ${scriptLoaded ? 'Yes' : 'No'}</p>
                                <p>The Go Together app failed to initialize. This might be due to:</p>
                                <ul style="text-align: left; max-width: 500px; margin: 0 auto;">
                                    ${!scriptLoaded ? '<li><strong>JavaScript bundle failed to load</strong></li>' : ''}
                                    <li>Module import/export errors</li>
                                    <li>Network connectivity issues</li>
                                    <li>Browser compatibility issues</li>
                                </ul>
                                <p><strong>Debug Info:</strong></p>
                                <ul style="text-align: left; max-width: 500px; margin: 0 auto; font-size: 12px;">
                                    <li>Hostname: ${window.location.hostname}</li>
                                    <li>User Agent: ${navigator.userAgent.substring(0, 50)}...</li>
                                    <li>Script Loaded: ${scriptLoaded}</li>
                                </ul>
                                <p><strong>Please check the browser console for error details.</strong></p>
                                <button onclick="window.location.reload()" style="padding: 10px 20px; margin: 10px; cursor: pointer;">
                                    Reload Page
                                </button>
                                <button onclick="console.log('Console test - this should appear in console')" style="padding: 10px 20px; margin: 10px; cursor: pointer;">
                                    Test Console
                                </button>
                            </div>
                        `;
                    }
                }
            }, 5000);
        });
    </script>
</body>
</html>
